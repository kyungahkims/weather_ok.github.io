<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../css/ok.css">
	<script src="../js/jquery-3.5.1.min.js"></script>
	<title>ok캐쉬백 날씨어때</title>
</head>

<body>
	<div class="wrap">
		<h3 class="title">모닝콜 설정</h3>
		<div class="box1">
			<div class="morning_call">
				<div class="col ampm" id="drum-ampm">
					<div class="drum-inner" id="inner-ampm"></div>
				</div>
				<div class="col hour" id="drum-hour">
					<div class="drum-inner" id="inner-hour"></div>
				</div>
				<span class="colon">:</span>
				<div class="col" id="drum-min">
					<div class="drum-inner" id="inner-min"></div>
				</div>
			</div>
			<ul class="week_wrap">
				<li><button type="button" class="active red">일</button></li>
				<li><button type="button">월</button></li>
				<li><button type="button">화</button></li>
				<li><button type="button" class="active">수</button></li>
				<li><button type="button">목</button></li>
				<li><button type="button">금</button></li>
				<li><button type="button" class="blue">토</button></li>
			</ul>
			<div class="switch_wrap">
				<div class="switch_title">
					<span>공휴일에는 끄기</span>
					<p>대체, 임시 공휴일에는 켜기</p>
				</div>
				<label class="switch">
					<input type="checkbox">
					<span class="slider"></span>
				</label>
			</div>
		</div>
		<div class="box2">
			<h3><span>리워드 모닝콜</span> 구독서비스란?</h3>
			<p>현대인의 필수 서비스 알람 기능을 사용만 해도 포인트를 드립니다. 더 나아가 오늘의 날씨, 지난 밤의 이슈 그리고 오늘의 운세를 무료로 내가 원하는 시간에 받아 볼 수있는 구독형 알람 리워드
				서비스
				입니다.</p>
			<p class="info">모닝콜을 설정만 해도 <span>100P 지급</span><br>매일 모닝콜 확인만해도 <span>2P 지급</span></p>
		</div>

		<div class="btn_wrap">
			<div class="bubble">모닝을 설정하고 포인트받기</div>
			<!-- <button type="button" class="cancle_btn">해제</button> -->
			<button type="button" class="save_btn">저장</button>
		</div>
	</div>
	<div class="morning_pop_wrap">
		<div class="pop">
			<h3 class="pop_title">모닝콜 해제 안내</h3>
			<p>모닝콜을 해제하시겠습니까?<br>취소 시 알람과 브리핑 서비스를 받아<br>보실 수 없습니다.</p>
			<div class="btn_wrap">
				<button type="button" class="p_btn">취소</button>
				<button type="button" class="b_btn">해제</button>
			</div>
		</div>
	</div>
	<script src="../js/ok.js"></script>
</body>

</html>
