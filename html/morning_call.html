<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Call Drum Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .morning_call {
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    user-select: none;
    position: relative;
  }

  /* 선택 영역 하이라이트 */
  .morning_call::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 63px;
    background: rgba(0,0,0,0.06);
    border-radius: 10px;
    pointer-events: none;
    z-index: 0;
  }

  .col {
    width: 90px;
    height: 189px; /* 3 * ITEM_H = 63*3 */
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .drum-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .drum-item {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 90px;
    height: 63px;
    font-size: 50px;
    font-weight: 600;
    color: #d0d0d0;
    cursor: grab;
    transition: color 0.15s;
  }

  .drum-item.near     { color: #999; }
  .drum-item.selected { color: #1a1a1a; }

  .col.ampm .drum-item {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.36px;
  }

  .col.hour .drum-item {
    justify-content: flex-end;
    padding: 0 20px;
  }

  .colon {
    font-size: 60px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1;
    margin: 0 2px;
    position: relative;
    z-index: 1;
  }

  /* 위아래 페이드 */
  .col::before,
  .col::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 63px;
    z-index: 2;
    pointer-events: none;
  }
  .col::before {
    top: 0;
    background: linear-gradient(to bottom, #f5f5f5 0%, transparent 100%);
  }
  .col::after {
    bottom: 0;
    background: linear-gradient(to top, #f5f5f5 0%, transparent 100%);
  }
</style>
</head>
<body>

<div class="morning_call">
  <div class="col ampm" id="drum-ampm">
    <div class="drum-inner" id="inner-ampm"></div>
  </div>
  <div class="col hour" id="drum-hour">
    <div class="drum-inner" id="inner-hour"></div>
  </div>
  <span class="colon">:</span>
  <div class="col" id="drum-min">
    <div class="drum-inner" id="inner-min"></div>
  </div>
</div>

<script>
const ITEM_H = 63;

/* ── 드래그 attach (관성 포함) ── */
function attachDrag(col, getIdx, setIdx, redraw, snap, clamp = v => v) {
  let startY   = 0;
  let startIdx = 0;
  let dragging = false;
  let lastY    = 0;
  let lastTime = 0;
  let velocity = 0;  // px/ms  (양수 = 위로 스크롤 = 인덱스 증가)
  let rafId    = null;

  const cancelMomentum = () => {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  };

  const runMomentum = () => {
    cancelMomentum();

    // FIX 1: 관성이 멈출 때 진행 방향(velocity 방향)으로 snap
    // velocity > 0 → 인덱스 증가 방향 → ceil
    // velocity < 0 → 인덱스 감소 방향 → floor
    const snapDir = velocity > 0 ? Math.ceil : Math.floor;

    let vel      = velocity / ITEM_H;  // idx/ms
    const friction = 0.88;             // 마찰 (낮을수록 빨리 멈춤)
    const minVel   = 0.003;            // 이 속도 이하면 snap

    const step = () => {
      vel *= friction;
      if (Math.abs(vel) < minVel) {
        // 남은 미세 거리를 진행 방향으로 올림/내림
        setIdx(clamp(snapDir(getIdx())));
        snap(snapDir);
        return;
      }
      setIdx(clamp(getIdx() + vel * 16));
      redraw(false);
      rafId = requestAnimationFrame(step);
    };
    rafId = requestAnimationFrame(step);
  };

  col.addEventListener('pointerdown', e => {
    cancelMomentum();
    startY   = e.clientY;
    lastY    = e.clientY;
    lastTime = e.timeStamp;
    startIdx = getIdx();
    velocity = 0;
    dragging = true;
    col.setPointerCapture(e.pointerId);
  });

  col.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dt = e.timeStamp - lastTime;
    if (dt > 0) velocity = (lastY - e.clientY) / dt;
    lastY    = e.clientY;
    lastTime = e.timeStamp;
    setIdx(clamp(startIdx + (startY - e.clientY) / ITEM_H));
    redraw(false);
  });

  col.addEventListener('pointerup', () => {
    if (!dragging) return;
    dragging = false;
    if (Math.abs(velocity) > 0.3) runMomentum();
    else snap(Math.round);
  });

  col.addEventListener('wheel', e => {
    e.preventDefault();
    cancelMomentum();
    setIdx(clamp(getIdx() + (e.deltaY > 0 ? 1 : -1)));
    snap(Math.round);
  }, { passive: false });
}

/* ── 무한 드럼 ── */
function buildInfiniteDrum(colId, innerId, items, initIdx, onChange) {
  const col   = document.getElementById(colId);
  const inner = document.getElementById(innerId);
  let idx          = initIdx;
  let renderedBase = null;

  const buildDOM = (base) => {
    inner.innerHTML = '';
    renderedBase = base;
    for (let i = base - 2; i <= base + 2; i++) {
      const realIdx = ((i % items.length) + items.length) % items.length;
      const div = document.createElement('div');
      div.className = 'drum-item';
      div.style.height = ITEM_H + 'px';
      div.textContent = items[realIdx];
      inner.appendChild(div);
    }
  };

  const updateSelected = () => {
    const ch   = inner.children;
    const base = renderedBase;
    for (let i = 0; i < ch.length; i++) {
      const dist = Math.abs((base - 2 + i) - idx);
      ch[i].className =
        'drum-item' +
        (dist < 0.5 ? ' selected' : dist < 1.5 ? ' near' : '');
    }
  };

  const applyTranslate = (animated) => {
    const ty = -ITEM_H * 2 + (renderedBase - idx) * ITEM_H;
    if (animated) {
      inner.style.transition = 'transform 0.18s cubic-bezier(0.22,1,0.36,1)';
      const onEnd = () => {
        inner.style.transition = '';
        inner.removeEventListener('transitionend', onEnd);
      };
      inner.addEventListener('transitionend', onEnd);
    } else {
      inner.style.transition = '';
    }
    inner.style.transform = `translateY(${ty}px)`;
  };

  const redraw = (full = true) => {
    const base = Math.round(idx);
    if (full || renderedBase === null || Math.abs(base - renderedBase) >= 2) {
      buildDOM(base);
    }
    applyTranslate(false);
    updateSelected();
  };

  // FIX 1: snap에 방향 함수 전달받아 사용
  const snap = (roundFn = Math.round) => {
    idx = roundFn(idx);
    const real = ((idx % items.length) + items.length) % items.length;
    buildDOM(idx);
    applyTranslate(true);
    updateSelected();
    onChange(real, idx);
  };

  attachDrag(col, () => idx, v => (idx = v), redraw, snap);

  // 초기화
  buildDOM(Math.round(idx));
  inner.style.transform = `translateY(${-ITEM_H * 2}px)`;
  updateSelected();

  return {
    forceIdx(i) {
      idx = i;
      buildDOM(Math.round(idx));
      applyTranslate(true);
      updateSelected();
    }
  };
}

/* ── 유한 드럼 ── */
function buildFiniteDrum(colId, innerId, items, initIdx, onChange) {
  const col   = document.getElementById(colId);
  const inner = document.getElementById(innerId);
  let idx          = initIdx;
  let renderedBase = null;

  const clamp = v => Math.max(0, Math.min(items.length - 1, v));

  const buildDOM = (base) => {
    inner.innerHTML = '';
    renderedBase = base;
    for (let i = 0; i < items.length; i++) {
      const div = document.createElement('div');
      div.className = 'drum-item';
      div.style.height = ITEM_H + 'px';
      div.textContent = items[i];
      inner.appendChild(div);
    }
  };

  const updateSelected = () => {
    const ch = inner.children;
    for (let i = 0; i < ch.length; i++) {
      const dist = Math.abs(i - idx);
      ch[i].className =
        'drum-item' +
        (dist < 0.5 ? ' selected' : dist < 1.5 ? ' near' : '');
    }
  };

  const applyTranslate = (animated) => {
    const ty = ITEM_H - idx * ITEM_H;
    if (animated) {
      inner.style.transition = 'transform 0.18s cubic-bezier(0.22,1,0.36,1)';
      const onEnd = () => {
        inner.style.transition = '';
        inner.removeEventListener('transitionend', onEnd);
      };
      inner.addEventListener('transitionend', onEnd);
    } else {
      inner.style.transition = '';
    }
    inner.style.transform = `translateY(${ty}px)`;
  };

  const redraw = (full = true) => {
    if (full || renderedBase === null) buildDOM(clamp(Math.round(idx)));
    applyTranslate(false);
    updateSelected();
  };

  // FIX 1: snap에 방향 함수 전달받아 사용
  const snap = (roundFn = Math.round) => {
    idx = clamp(roundFn(idx));
    applyTranslate(true);
    updateSelected();
    onChange(idx);
  };

  attachDrag(col, () => idx, v => (idx = clamp(v)), redraw, snap, clamp);

  // 초기화
  buildDOM(clamp(Math.round(idx)));
  applyTranslate(false);
  updateSelected();

  return {
    forceIdx(i) {
      idx = clamp(i);
      applyTranslate(true);
      updateSelected();
    }
  };
}

/* ── 데이터 ── */
// 인덱스 0 = '12', 1 = '1', ..., 11 = '11'
// → 사이클 경계가 정확히 12→1 사이(인덱스 11→12)에서 발생
const hourItems = ['12', ...Array.from({ length: 11 }, (_, i) => String(i + 1))];
const minItems  = Array.from({ length: 60 }, (_, i) => String(i).padStart(2, '0'));
const ampmItems = ['오전', '오후'];

// 현재 시각 기준으로 초기값 설정
const now      = new Date();
const nowHour  = now.getHours();   // 0~23
const nowMin   = now.getMinutes(); // 0~59

// 오전/오후 초기 인덱스 (0=오전, 1=오후)
let ampmIdx = nowHour < 12 ? 0 : 1;

// hourItems에서 현재 시각에 해당하는 인덱스
// 0시/12시 → 인덱스 0('12'), 1시/13시 → 인덱스 1('1'), ..., 11시/23시 → 인덱스 11('11')
const h12 = nowHour % 12;          // 0~11
let hourIdx = h12;                  // 인덱스 0='12', 1='1', ..., 11='11'
let minIdx  = nowMin;

let ampmDrum;

/* ── AM/PM 드럼 먼저 생성 ── */
ampmDrum = buildFiniteDrum('drum-ampm', 'inner-ampm', ampmItems, ampmIdx, i => {
  ampmIdx = i;
});

/* ── 시간 드럼 ── */
// raw = ampmIdx * 12 + hourIdx
// 오전 12시 → raw=0, 오전 1시 → raw=1, ..., 오전 11시 → raw=11
// 오후 12시 → raw=12, 오후 1시 → raw=13, ..., 오후 11시 → raw=23
const initRawHour = ampmIdx * 12 + hourIdx;

buildInfiniteDrum('drum-hour', 'inner-hour', hourItems, initRawHour, (real, raw) => {
  hourIdx = real;

  // raw를 12로 나눈 몫의 홀짝으로 오전/오후 결정
  // Math.floor 로 음수 raw도 올바르게 처리
  const cycle   = Math.floor(raw / 12);
  const newAmpm = ((cycle % 2) + 2) % 2;

  if (newAmpm !== ampmIdx) {
    ampmIdx = newAmpm;
    ampmDrum.forceIdx(ampmIdx);
  }
});

/* ── 분 드럼 ── */
buildInfiniteDrum('drum-min', 'inner-min', minItems, minIdx, i => {
  minIdx = i;
});
</script>
</body>
</html>
