<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Call Drum Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .morning_call {
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    user-select: none;
    position: relative;
  }

  /* 선택 영역 하이라이트 */
  .morning_call::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 63px;
    background: rgba(0,0,0,0.06);
    border-radius: 10px;
    pointer-events: none;
    z-index: 0;
  }

  .col {
    width: 90px;
    height: 189px; /* 3 * ITEM_H = 63*3 */
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .drum-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    /* transition은 snap 시에만 JS로 붙였다 뗌 */
  }

  .drum-item {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 90px;
    height: 63px;
    font-size: 50px;
    font-weight: 600;
    color: #d0d0d0;
    cursor: grab;
    transition: color 0.15s;
  }

  .drum-item.near   { color: #999; }
  .drum-item.selected { color: #1a1a1a; }

  .col.ampm .drum-item {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.36px;
  }

  .col.hour .drum-item {
    justify-content: flex-end;
    padding: 0 20px;
  }

  .colon {
    font-size: 60px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1;
    margin: 0 2px;
    position: relative;
    z-index: 1;
  }

  /* 위아래 페이드 */
  .col::before,
  .col::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 63px;
    z-index: 2;
    pointer-events: none;
  }
  .col::before {
    top: 0;
    background: linear-gradient(to bottom, #f5f5f5 0%, transparent 100%);
  }
  .col::after {
    bottom: 0;
    background: linear-gradient(to top, #f5f5f5 0%, transparent 100%);
  }
</style>
</head>
<body>

<div class="morning_call">
  <div class="col ampm" id="drum-ampm">
    <div class="drum-inner" id="inner-ampm"></div>
  </div>
  <div class="col hour" id="drum-hour">
    <div class="drum-inner" id="inner-hour"></div>
  </div>
  <span class="colon">:</span>
  <div class="col" id="drum-min">
    <div class="drum-inner" id="inner-min"></div>
  </div>
</div>

<script>
const ITEM_H = 63;

/* ── 드래그 attach (관성 포함) ── */
function attachDrag(col, getIdx, setIdx, redraw, snap, clamp = v => v) {
  let startY   = 0;
  let startIdx = 0;
  let dragging = false;
  let lastY    = 0;
  let lastTime = 0;
  let velocity = 0;  // px/ms
  let rafId    = null;

  const cancelMomentum = () => {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  };

  const runMomentum = () => {
    cancelMomentum();
    let vel      = velocity / ITEM_H;  // idx/ms
    const friction = 0.92;
    const minVel   = 0.001;

    const step = () => {
      vel *= friction;
      if (Math.abs(vel) < minVel) { snap(); return; }
      setIdx(clamp(getIdx() + vel * 16));
      redraw(false);
      rafId = requestAnimationFrame(step);
    };
    rafId = requestAnimationFrame(step);
  };

  col.addEventListener('pointerdown', e => {
    cancelMomentum();
    startY   = e.clientY;
    lastY    = e.clientY;
    lastTime = e.timeStamp;
    startIdx = getIdx();
    velocity = 0;
    dragging = true;
    col.setPointerCapture(e.pointerId);
  });

  col.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dt = e.timeStamp - lastTime;
    if (dt > 0) velocity = (lastY - e.clientY) / dt;
    lastY    = e.clientY;
    lastTime = e.timeStamp;
    setIdx(clamp(startIdx + (startY - e.clientY) / ITEM_H));
    redraw(false);
  });

  col.addEventListener('pointerup', () => {
    if (!dragging) return;
    dragging = false;
    if (Math.abs(velocity) > 0.3) runMomentum();
    else snap();
  });

  col.addEventListener('wheel', e => {
    e.preventDefault();
    cancelMomentum();
    setIdx(clamp(getIdx() + (e.deltaY > 0 ? 1 : -1)));
    snap();
  }, { passive: false });
}

/* ── 무한 드럼 ── */
function buildInfiniteDrum(colId, innerId, items, initIdx, onChange) {
  const col   = document.getElementById(colId);
  const inner = document.getElementById(innerId);
  let idx          = initIdx;
  let renderedBase = null;

  const buildDOM = (base) => {
    inner.innerHTML = '';
    renderedBase = base;
    for (let i = base - 2; i <= base + 2; i++) {
      const realIdx = ((i % items.length) + items.length) % items.length;
      const div = document.createElement('div');
      div.className = 'drum-item';
      div.style.height = ITEM_H + 'px';
      div.textContent = items[realIdx];
      inner.appendChild(div);
    }
  };

  const updateSelected = () => {
    const ch   = inner.children;
    const base = renderedBase;
    for (let i = 0; i < ch.length; i++) {
      const dist = Math.abs((base - 2 + i) - idx);
      ch[i].className =
        'drum-item' +
        (dist < 0.5 ? ' selected' : dist < 1.5 ? ' near' : '');
    }
  };

  const applyTranslate = (animated) => {
    const ty = -ITEM_H * 2 + (renderedBase - idx) * ITEM_H;
    if (animated) {
      inner.style.transition = 'transform 0.18s cubic-bezier(0.22,1,0.36,1)';
      // 다음 프레임 후 transition 제거
      const onEnd = () => {
        inner.style.transition = '';
        inner.removeEventListener('transitionend', onEnd);
      };
      inner.addEventListener('transitionend', onEnd);
    } else {
      inner.style.transition = '';
    }
    inner.style.transform = `translateY(${ty}px)`;
  };

  const redraw = (full = true) => {
    const base = Math.round(idx);
    if (full || renderedBase === null || Math.abs(base - renderedBase) >= 2) {
      buildDOM(base);
    }
    applyTranslate(false);
    updateSelected();
  };

  const snap = () => {
    idx = Math.round(idx);
    const real = ((idx % items.length) + items.length) % items.length;
    buildDOM(idx);
    applyTranslate(true);
    updateSelected();
    onChange(real, idx);
  };

  attachDrag(col, () => idx, v => (idx = v), redraw, snap);

  // 초기화
  buildDOM(Math.round(idx));
  inner.style.transform = `translateY(${-ITEM_H * 2}px)`;
  updateSelected();

  return {
    forceIdx(i) {
      idx = i;
      buildDOM(Math.round(idx));
      applyTranslate(true);
      updateSelected();
    }
  };
}

/* ── 유한 드럼 ── */
function buildFiniteDrum(colId, innerId, items, initIdx, onChange) {
  const col   = document.getElementById(colId);
  const inner = document.getElementById(innerId);
  let idx          = initIdx;
  let renderedBase = null;

  const clamp = v => Math.max(0, Math.min(items.length - 1, v));

  // 전체 아이템을 한 번만 렌더, 빈칸 없이
  const buildDOM = (base) => {
    inner.innerHTML = '';
    renderedBase = base;
    for (let i = 0; i < items.length; i++) {
      const div = document.createElement('div');
      div.className = 'drum-item';
      div.style.height = ITEM_H + 'px';
      div.textContent = items[i];
      inner.appendChild(div);
    }
  };

  const updateSelected = () => {
    const ch = inner.children;
    for (let i = 0; i < ch.length; i++) {
      const dist = Math.abs(i - idx);
      ch[i].className =
        'drum-item' +
        (dist < 0.5 ? ' selected' : dist < 1.5 ? ' near' : '');
    }
  };

  // 전체 아이템 렌더 방식: idx번 아이템이 뷰포트 중앙에 오도록
  // col 높이 189 = 3*ITEM_H → 중앙 y = ITEM_H
  // inner top offset = ITEM_H - idx * ITEM_H
  const applyTranslate = (animated) => {
    const ty = ITEM_H - idx * ITEM_H;
    if (animated) {
      inner.style.transition = 'transform 0.18s cubic-bezier(0.22,1,0.36,1)';
      const onEnd = () => {
        inner.style.transition = '';
        inner.removeEventListener('transitionend', onEnd);
      };
      inner.addEventListener('transitionend', onEnd);
    } else {
      inner.style.transition = '';
    }
    inner.style.transform = `translateY(${ty}px)`;
  };

  const redraw = (full = true) => {
    if (full || renderedBase === null) buildDOM(clamp(Math.round(idx)));
    applyTranslate(false);
    updateSelected();
  };

  const snap = () => {
    idx = clamp(Math.round(idx));
    applyTranslate(true);
    updateSelected();
    onChange(idx);
  };

  attachDrag(col, () => idx, v => (idx = clamp(v)), redraw, snap, clamp);

  // 초기화
  buildDOM(clamp(Math.round(idx)));
  applyTranslate(false);
  updateSelected();

  return {
    forceIdx(i) {
      idx = clamp(i);
      applyTranslate(true);
      updateSelected();
    }
  };
}

/* ── 데이터 ── */
const hourItems = Array.from({ length: 12 }, (_, i) => String(i + 1));
const minItems  = Array.from({ length: 60 }, (_, i) => String(i).padStart(2, '0'));
const ampmItems = ['오전', '오후'];

let ampmIdx = 0, hourIdx = 0, minIdx = 0, rawHour = 0;

/* ── 생성 ── */
const ampmDrum = buildFiniteDrum('drum-ampm', 'inner-ampm', ampmItems, ampmIdx, i => {
  ampmIdx = i;
});

const initCycle = 0;
const initAmpm  = ampmIdx;

buildInfiniteDrum('drum-hour', 'inner-hour', hourItems, hourIdx, (real, raw) => {
  rawHour  = raw;
  hourIdx  = real;

  const cycleDiff = Math.floor(raw / 12) - initCycle;
  const newAmpm   = (((initAmpm + cycleDiff) % 2) + 2) % 2;

  if (newAmpm !== ampmIdx) {
    ampmIdx = newAmpm;
    ampmDrum.forceIdx(ampmIdx);
  }
});

buildInfiniteDrum('drum-min', 'inner-min', minItems, minIdx, i => {
  minIdx = i;
});
</script>
</body>
</html>
